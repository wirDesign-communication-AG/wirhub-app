name: Docker Base Image (PHP-FPM)

on:
    schedule:
        -   cron: '0 8 * * 5'
    push:
        branches: [ 'main', 'v3.2', 'v3.2.*' ]
        paths:
            - build/docker/base/Dockerfile
            - build/docker/base-with-node/Dockerfile

jobs:
    base:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            id-token: write

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4

            -   name: Setup Docker buildx
                uses: docker/setup-buildx-action@v3

            -   name: Log into ghcr.io
                if: github.event_name != 'pull_request'
                uses: docker/login-action@v3
                with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            #-   name: Build & Push
            #    uses: docker/build-push-action@v6
            #    with:
            #        context: .
            #        file: build/docker/base/Dockerfile
            #        push: true
            #        tags: |
            #            ghcr.io/wirdesign-communication-ag/wirhub-app/base:latest

    base-with-node:
        needs: base
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            id-token: write

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4

            -   name: Setup Docker buildx
                uses: docker/setup-buildx-action@v3

            -   name: Log into ghcr.io
                if: github.event_name != 'pull_request'
                uses: docker/login-action@v3
                with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            #-   name: Build & Push
            #    uses: docker/build-push-action@v6
            #    with:
           #         context: .
           #         file: build/docker/base-with-node/Dockerfile
           #         push: true
           #         tags: |
           #             ghcr.io/wirdesign-communication-ag/wirhub-app/base-with-node:latest
